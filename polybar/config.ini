[colors]
; Background colors
background = #272E33
background-alt = #2E383C

; Text colors
foreground = #D3C6AA
disabled = #7A8478

; Accent colors
primary = #A7C080
secondary = #E69875
tertiary = #374145
alert = #4C3743

; Additional colors from the palette you might want to use
yellow = #DBBC7F
blue = #7FBBB3
aqua = #83C092
purple = #D699B6
red = #E67E80
orange = #E69875
statusline1 = #A7C080
statusline2 = #D3C6AA
statusline3 = #E67E80

[bar/mybar]
width = 100%
height = 24pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = DepartureMonoNerdFont;2

modules-left = xworkspaces xwindow
modules-center = date
modules-right = pulseaudio brightness xkeyboard wifi memory cpu battery

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
ramp-volume-0 = ÔÄ¶ 
ramp-volume-1 = ÔÄß 
ramp-volume-2 = ÔÄ®
format-volume-foreground = ${colors.blue}

label-muted = ůįĚü 
label-muted-foreground = ${colors.disabled}

[module/battery]
type = custom/script
exec = ~/.config/polybar/battery_status
interval = 10
label = %output%

[module/brightness]
type = custom/script
exec = light | cut -d'.' -f1
interval = 1
format = <label>
label = ÔÜÖ %output%%
label-foreground = ${colors.yellow}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = ÔĄú %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÓŅÖ "
format-prefix-foreground = ${colors.aqua}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Óļú "
format-prefix-foreground = ${colors.purple}
label = %percentage:2%%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[module/wifi]
type = internal/network
interface = wlan0
interval = 3

; Connected
format-connected = <ramp-signal> <label-connected>
label-connected = %signal%%
format-connected-foreground = ${colors.orange}

; Signal strength icons (Nerd Fonts)
ramp-signal-0 = ůį§Į 
ramp-signal-1 = ůį§ü 
ramp-signal-2 = ůį§Ę
ramp-signal-3 = ůį§• 
ramp-signal-4 = ůį§® 

; Disconnected
format-disconnected = ůį§≠ 
format-disconnected-foreground = ${colors.disable}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
